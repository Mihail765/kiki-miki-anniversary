<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Our Private Chat</title>
    <link rel="icon" href="sliki/icons/mk.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="chat.css" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/safetyCode.js"></script>
    <script src="js/cloudinary-config.js"></script>
  </head>
  <body>
    <!-- LOADER -->
    <div id="loader">
      <div class="heart-loader"></div>
    </div>

    <!-- Shto da kazuvam pokje pufle, do koga ke istrazuvash kazi mi? To sho go barash go ima ama na greshno mesto barash -->
    <!-- Sigurno se prashvash koe tocnoto mesto. Epa tocnoto mesto e na tocnoto mesto😅😅😅 -->
    <!-- Џокинг Џокинг. Ima neshta sho se podskrieni, ne e lesno ama ke gi najdish -->

    <!-- LIGHTBOX -->
    <div id="lightbox">
      <button id="lightbox-close">✕</button>

      <!-- Image wrapper -->
      <div id="lb-img-wrap">
        <img id="lightbox-img" src="" alt="Full size" />
      </div>

      <div id="lightbox-nav">
        <button class="lb-nav-btn" id="lb-prev">‹</button>
        <span id="lightbox-counter"></span>
        <button class="lb-nav-btn" id="lb-next">›</button>
      </div>
    </div>

    <!-- CAMERA MODAL -->
    <div id="camera-modal">
      <div
        id="camera-live-wrap"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 16px;
          width: 100%;
          max-width: 480px;
          padding: 0 16px;
        "
      >
        <video id="camera-feed" autoplay playsinline muted></video>
        <div id="camera-controls">
          <button class="cam-control-btn" id="close-camera-btn" title="Cancel">
            ✕
          </button>
          <button id="snap-btn" title="Take photo"></button>
          <button
            class="cam-control-btn"
            id="flip-camera-btn"
            title="Flip camera"
          >
            🔄
          </button>
        </div>
      </div>
      <div id="camera-preview-wrap">
        <img id="camera-preview-img" src="" alt="Photo preview" />
        <div id="camera-preview-btns">
          <button class="cam-action-btn" id="retake-btn">Retake</button>
          <button class="cam-action-btn" id="use-photo-btn">
            Use Photo 💌
          </button>
        </div>
      </div>
    </div>

    <!-- EMOJI TRAY -->
    <div id="emoji-tray"></div>

    <!-- SCROLL TO BOTTOM FAB -->
    <button id="scroll-to-bottom" title="Scroll to latest">↓</button>

    <!-- MAIN APP -->
    <div id="app">
      <!-- HEADER -->
      <header id="chat-header">
        <a href="landingPage.html" id="back-btn">‹</a>
        <div class="header-avatar">💌</div>
        <div class="header-info">
          <div class="header-name" id="header-name">Кикица & Микица</div>
          <div class="header-status">
            <span class="status-dot"></span>
            <span id="status-text">Just the two of us ❤️</span>
          </div>
        </div>
      </header>

      <!-- NOTIFICATION PERMISSION BANNER -->
      <div id="notif-banner">
        <span>🔔 Allow notifications to know when a new message arrives!</span>
        <button id="notif-allow-btn">Allow</button>
        <button id="notif-dismiss-btn">✕</button>
      </div>

      <!-- UPLOAD PROGRESS -->
      <div id="upload-progress">
        <div id="upload-progress-bar"></div>
      </div>

      <!-- MESSAGES -->
      <div id="messages-container">
        <div id="empty-state">
          <div class="big-heart">💌</div>
          <h3>Our private chat</h3>
          <p>Ова не е meta, ова е нашиот Safe Space 🥰</p>
        </div>
      </div>

      <!-- IMAGE PREVIEW BAR (multi) -->
      <div id="img-preview-bar">
        <div id="preview-info">
          <span id="preview-count-label">0 image(s) selected</span>
          <button id="clear-all-btn">Remove all</button>
        </div>
        <div id="preview-scroll">
          <button id="add-more-btn">
            <span class="plus">＋</span>
            <span>Add</span>
          </button>
        </div>
      </div>

      <!-- TYPING BUBBLE — appears bottom-left above input when partner is typing -->
      <div id="typing-bubble" aria-live="polite"></div>

      <!-- REPLY BAR -->
      <div id="reply-bar"></div>

      <!-- INPUT BAR -->
      <div id="input-bar">
        <button class="input-icon-btn" id="emoji-toggle-btn" title="Emoji">
          😊
        </button>

        <label
          class="input-icon-btn"
          for="file-input"
          title="Send image"
          id="gallery-label"
        >
          📎
          <input type="file" id="file-input" hidden accept="image/*" multiple />
        </label>

        <button class="input-icon-btn" id="camera-btn" title="Camera">
          📷
        </button>

        <textarea
          id="msg-input"
          placeholder="Write something"
          rows="1"
        ></textarea>
        <button id="send-btn" title="Send">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>

        <!-- 
      Epa ko si tolku zainteresirana ova pod komentarot e canvas se koristi za crtanje so 
      javascript a vo ovaj slucaj go koristam za kameratata 
    -->



    <!-- Hidden canvas for camera snap -->
    <canvas id="snap-canvas" style="display: none"></canvas>

    <script src="js/chat.js"></script>
  </body>
</html>
