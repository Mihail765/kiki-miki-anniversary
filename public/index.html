<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You & Me</title>
    <link rel="stylesheet" href="logIn.css" />
    <link rel="icon" href="sliki/icons/mk.png" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="js/firebase-config.js"></script>
  </head>
  <body>
    <div id="logInWIndow">
      <div id="logInUpperPart">
        <h1 class="logInH1">Enter a date to continue</h1>
        <h3 class="logInH3">
          ATTENTION ONLY ONE PERSON KNOWS <br />
          THE REQUIRED DATE!
        </h3>
      </div>

      <div id="logInLowerPart">
        <div id="logInDate">
          <input
            type="text"
            required
            class="timeDate"
            name="day"
            id="day"
            placeholder="Day"
            maxlength="2"
            inputmode="numeric"
          />
          <input
            type="text"
            required
            class="timeDate"
            name="month"
            id="month"
            placeholder="Month"
            maxlength="2"
            inputmode="numeric"
          />
          <input
            type="text"
            required
            class="timeDate"
            name="year"
            id="year"
            placeholder="Year"
            maxlength="4"
            inputmode="numeric"
          />
          <input
            type="text"
            required
            class="timeDate"
            name="time"
            id="time"
            maxlength="5"
            placeholder="Hr : Min"
            inputmode="numeric"
          />
        </div>
        <div id="logInButton">
          <button class="logInBtn" id="logInBtn">Enter</button>
        </div>
      </div>

      <div id="step-who">
        <p class="who-label">Who iz you?</p>
        <div id="who-grid">
          <button class="whoBtn" onclick="loginAs('mikica')">
            <span class="btn-emoji">💙</span>
            <span class="btn-name">Микица</span>
          </button>
          <button class="whoBtn" onclick="loginAs('kikica')">
            <span class="btn-emoji">💗</span>
            <span class="btn-name">Кикица</span>
          </button>
        </div>
      </div>
    </div>

    <script src="js/logIn.js"></script>
  </body>
</html>
