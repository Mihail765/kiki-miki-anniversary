<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="logIn.css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <style>
      /* ── Step 2: who-are-you panel ───────────────────────────────── */

      /* Expand the card to fit the who buttons */
      #logInWIndow.step2 {
        height: auto;
        padding-bottom: 20px;
        gap: 10px;
      }

      #step-who {
        display: none;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 14px;
        animation: fadeSlideIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275)
          both;
      }
      #step-who.visible {
        display: flex;
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .who-label {
        font-family: "Rokkitt", serif;
        font-size: 13px;
        font-weight: 500;
        color: black;
        letter-spacing: 0.5px;
        text-align: center;
        margin: 0;
      }

      #who-grid {
        display: flex;
        flex-direction: row;
        gap: 16px;
        justify-content: center;
        width: 100%;
        padding: 0 min(25px, 10px);
        box-sizing: border-box;
      }

      .whoBtn {
        flex: 1;
        max-width: 180px;
        height: 60px;
        background: linear-gradient(to right, #ffb6c1 0%, #f78da7 100%);
        border: none;
        border-radius: 5px;
        cursor:
          url(/public/cursor/Preppy-Pinky-Spider-Man-Arrow--p.png) 0 0,
          auto;
        transition: all 0.2s ease-in-out;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
      }
      .whoBtn:hover {
        box-shadow: 0 0 15px white;
      }
      .whoBtn:active {
        background: linear-gradient(to left, #ffb6c1 0%, #f78da7 100%);
        scale: 0.98;
      }

      .whoBtn .btn-emoji {
        font-size: 22px;
        line-height: 1;
      }
      .whoBtn .btn-name {
        font-family: "Rochester", cursive;
        font-size: 20px;
        -webkit-text-stroke: 1px #cc3366;
        color: white;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="logInWIndow">
      <!-- ── STEP 1: existing upper block ── -->
      <div id="logInUpperPart">
        <h1 class="logInH1">Enter a date to continue</h1>
        <h3 class="logInH3">
          ATTENTION ONLY ONE PERSON KNOWS <br />
          THE REQUIRED DATE!
        </h3>
      </div>

      <!-- ── STEP 1: date inputs ── -->
      <div id="logInLowerPart">
        <div id="logInDate">
          <input
            type="text"
            required
            class="timeDate"
            name="day"
            id="day"
            placeholder="Day"
            maxlength="2"
            inputmode="numeric"
          />
          <input
            type="text"
            required
            class="timeDate"
            name="month"
            id="month"
            placeholder="Month"
            maxlength="2"
            inputmode="numeric"
          />
          <input
            type="text"
            required
            class="timeDate"
            name="year"
            id="year"
            placeholder="Year"
            maxlength="4"
            inputmode="numeric"
          />
          <input
            type="text"
            required
            class="timeDate"
            name="time"
            id="time"
            maxlength="5"
            placeholder="Hr : Min"
            inputmode="numeric"
          />
        </div>
        <div id="logInButton">
          <button class="logInBtn" id="logInBtn">Enter</button>
        </div>
      </div>

      <!-- ── STEP 2: who are you (hidden until correct date) ── -->
      <div id="step-who">
        <p class="who-label">WHO ARE YOU?</p>
        <div id="who-grid">
          <button class="whoBtn" onclick="loginAs('mikica')">
            <span class="btn-emoji">💙</span>
            <span class="btn-name">Микица</span>
          </button>
          <button class="whoBtn" onclick="loginAs('kikica')">
            <span class="btn-emoji">💗</span>
            <span class="btn-name">Кикица</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      // Already fully logged in → skip
      if (
        sessionStorage.getItem("loggedIn") &&
        sessionStorage.getItem("user")
      ) {
        window.location.replace("landingPage.html");
      }

      // ── Number-only input handling ────────────────────────────────
      document.getElementById("day").addEventListener("input", numbered);
      document.getElementById("month").addEventListener("input", numbered);
      document.getElementById("year").addEventListener("input", numbered);

      document.getElementById("time").addEventListener("input", function () {
        let vrednost = this.value.replace(/[^0-9]/g, "");
        if (vrednost.length > 2) {
          vrednost = vrednost.slice(0, 2) + ":" + vrednost.slice(2, 4);
        }
        this.value = vrednost.slice(0, 5);
      });

      function numbered() {
        let vrednost = this.value.replace(/[^0-9]/g, "");
        this.value = vrednost.slice(0, 5);
      }

      // ── Auto-advance focus ────────────────────────────────────────
      document.getElementById("day").addEventListener("input", function () {
        if (this.value.length === 2) document.getElementById("month").focus();
      });
      document.getElementById("month").addEventListener("input", function () {
        if (this.value.length === 1 && this.value !== "0") {
          document.getElementById("year").focus();
        } else if (this.value.length === 2) {
          document.getElementById("year").focus();
        }
      });
      document.getElementById("year").addEventListener("input", function () {
        if (this.value.length === 4) document.getElementById("time").focus();
      });

      // ── Date check ───────────────────────────────────────────────
      document.getElementById("logInBtn").addEventListener("click", Najava);
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") Najava();
      });

      function Najava() {
        const correctDay = 26;
        const correctMonth = 4;
        const correctYear = 2024;
        const correctTime = ["21:50", "21:51"];

        let day = parseInt(document.getElementById("day").value);
        let month = parseInt(document.getElementById("month").value);
        let year = parseInt(document.getElementById("year").value);
        let hrMin = document.getElementById("time").value;

        if (
          day === correctDay &&
          month === correctMonth &&
          year === correctYear &&
          correctTime.includes(hrMin)
        ) {
          document.getElementById("logInLowerPart").style.display = "none";
          document
            .getElementById("logInUpperPart")
            .querySelector("h3").textContent =
            "Almost there… just one more step 💕";
          document
            .getElementById("logInUpperPart")
            .querySelector("h1").textContent = "Who are you?";
          document.getElementById("step-who").classList.add("visible");
          document.getElementById("logInWIndow").classList.add("step2");
        } else {
          alert("You have entered the wrong date!!");
        }
      }

      function loginAs(who) {
        sessionStorage.setItem("loggedIn", "true");
        sessionStorage.setItem("user", who);
        localStorage.setItem("mk_user", who);

        window.location.replace("landingPage.html");
      }
    </script>
  </body>
</html>
