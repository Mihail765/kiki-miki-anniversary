<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="favourites.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add_box"
    />
    <title>Our Favourites</title>
    <link rel="icon" href="sliki/icons/mk.png" />

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/safetyCode.js"></script>
    <script src="js/cloudinary-config.js"></script>
    <script src="js/database-helpers.js"></script>
  </head>

  <body>
    <div id="loader">
      <div class="loader-heart"></div>
    </div>
    <header id="hideHeader">
      <nav class="navbar">
        <h1 class="favouriteH1">Kiki + Miki</h1>
        <ul class="navUl ul1">
          <li><a href="landingPage.html">HOME</a></li>
          <li><a href="timeline.html">Timeline</a></li>
        </ul>
        <ul class="navUl ul2">
          <li><a href="chat.html">Message me</a></li>
          <li><a href="#">Coming soon</a></li>
        </ul>
        <div id="menu">
          <img
            id="menuChange"
            class="rotateMenu"
            src="sliki/icons/burgerBig.png"
            alt="menu"
          />
        </div>
        <div id="colectionOfDrop" class="colectionOfDrop">
          <ul id="navlistDrop">
            <a class="listItemLinkDrop" href="landingPage.html"
              ><li>Home</li></a
            >
            <a class="listItemLinkDrop" href="timeline.html"
              ><li>Timeline</li></a
            >
            <a class="listItemLinkDrop" href="chat.html"><li>Message me</li></a>
            <a class="listItemLinkDrop" href="#"><li>Coming soon</li></a>
            <a class="listItemLinkDrop" href="#"><li>Coming soon</li></a>
            <button id="logOutDrop" class="logOut"><span>Log out</span></button>
          </ul>
        </div>
      </nav>
    </header>

    <!-- Kikica i tuka?? vo favourite page? cccccc -->
    <!-- Ti si my favourite -->

    <div id="popUpWindow">
      <div class="popup-header">
        <button class="backBtn" id="backBnt">Back</button>
        <div class="popup-search-row">
          <input
            type="text"
            id="searchFld"
            placeholder="Search for a song…"
            autocomplete="off"
          />
          <button id="searchBtn">Search</button>
        </div>
      </div>

      <div class="results-list" id="resultsList">
        <div class="state-msg">Search for a song to add it 🎵</div>
      </div>

      <div class="mini-player" id="miniPlayer">
        <div class="mini-top">
          <img
            src=""
            alt=""
            id="miniArt"
            class="mini-art"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
          />
          <div class="mini-meta">
            <div class="mini-title" id="miniTitle">-</div>
            <div class="mini-artist" id="miniArtist">-</div>
          </div>
          <div class="mini-controls">
            <!-- skip previous -->
            <button id="secondary01" class="mini-btn hvrBtn secondary">
              <img
                src="sliki/icons/skipPrevious.png"
                alt="prev"
                class="btn-icon skipBFr"
              />
            </button>
            <!-- play / pause — image swaps on click -->
            <button class="mini-btn hvrBtn" id="miniPlayBtn">
              <img
                src="sliki/icons/playBtn.png"
                alt="play"
                class="btn-icon"
                id="miniPlayImg"
              />
            </button>
            <!-- skip next -->
            <button id="secondary02" class="mini-btn hvrBtn secondary">
              <img
                src="sliki/icons/skipNext.png"
                alt="next"
                class="btn-icon skipBFr"
              />
            </button>
          </div>
        </div>
        <div class="mini-proggress-wrap">
          <span class="mini-time" id="miniCurrent">0:00</span>
          <div class="mini-track" id="miniTrack">
            <div class="mini-fill" id="miniFill"></div>
          </div>
          <span class="mini-time" id="miniDuration">0:30</span>
        </div>
      </div>
    </div>

    <!-- Places popup -->
    <div id="placePopUpWindow">
      <div class="popup-header">
        <button class="backBtn" id="placeBackBtn">Back</button>
        <h3 class="place-popup-title">Add a Place 📍</h3>
      </div>
      <div class="place-form">
        <label class="place-upload-area" id="placeUploadArea" for="placeImageInput">
          <img id="placePreviewImg" class="place-preview-img" src="" alt="" style="display:none;" />
          <div id="placeUploadPrompt" class="place-upload-prompt">
            <span style="font-size:36px;">📷</span>
            <span>Tap to choose a photo</span>
          </div>
        </label>
        <input type="file" id="placeImageInput" accept="image/*" style="display:none;" />
        <input type="text" id="placeName" class="place-input" placeholder="Place name (e.g. Ohrid)" maxlength="60" />
        <input type="text" id="placeCaption" class="place-input" placeholder="Caption (optional)" maxlength="100" />
        <button id="savePlaceBtn" class="place-save-btn hvrBtn">Save Place 💕</button>
        <div id="placeStatus" class="place-status"></div>
      </div>
    </div>

    <!-- I lovveee uuuuuuuuuuuuuuuuuuuuu -->

    <div id="shadow"></div>
    <div id="shadow2"></div>

    <div class="wrapper">
      <section class="sectionFav">
        <div class="texts">
          <h2 class="title">Our songs</h2>
          <h3 class="addBtn" id="addBtn">
            Add
            <span class="material-symbols-outlined">add_box</span>
          </h3>
        </div>
        <div class="gridItems" id="songsGrid"></div>
      </section>

      <section class="sectionFav">
        <div class="texts">
          <h2 class="title">Our Places</h2>
          <h3 class="addBtn" id="addPlaceBtn">
            Add
            <span class="material-symbols-outlined">add_box</span>
          </h3>
        </div>
        <div class="gridItems" id="placesGrid"></div>
      </section>
    </div>

    <audio id="globalAudio"></audio>
    <!-- For you babygirl 💖💖💖💗💗💗❤️❤️❤️❤️❤️💗💗💖💖💖 -->
    <!-- I neshto za jadenje oti od tolku baranje ogladna 🍕🍟🥞🍟🍟🍟🍟🥪🌯🌮🍧🧁🎂 -->
    <script src="js/favourite.js"></script>
  </body>
</html>
